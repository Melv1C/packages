name: Publish Package

on:
  push:
    tags:
      - '@melv1c/*@*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Extract package directory from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Tag format: @melv1c/<name>@<version>
          # Extract the package name (e.g. "ui-core" from "@melv1c/ui-core@1.0.0")
          PKG_NAME=$(echo "$TAG" | sed -E 's/@melv1c\/(.+)@.+/\1/')
          echo "dir=packages/${PKG_NAME}" >> "$GITHUB_OUTPUT"
          echo "Publishing package from packages/${PKG_NAME}"

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: ${{ steps.pkg.outputs.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
